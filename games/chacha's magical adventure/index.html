<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>茶茶的魔法冒险</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: radial-gradient(ellipse at center, #1a0a3e 0%, #0d0520 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
}
#wrap { position:relative; display:flex; align-items:center; justify-content:center; }
canvas {
  display:block; border-radius:12px;
  box-shadow:0 0 50px rgba(120,80,255,0.6), 0 0 100px rgba(80,40,180,0.3);
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');

function resize() {
  // fullscreen: the game canvas takes the whole viewport (controls live inside it)
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min((vw-8) / 480, (vh-8) / 680);
  cv.width = 480; cv.height = 680;
  cv.style.width  = Math.round(480 * scale) + 'px';
  cv.style.height = Math.round(680 * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);
const W = 480, H = 680;

// ── Load images ───────────────────────────────────────────────────────────────
const IMG = {};
const IMG_SRC = {
  garden: 'garden.jpg',
  cloud:  'cloud.jpg',
  ocean:  'ocean.jpg',
  desert: 'desert.jpg',
  ice:    'ice.jpg',
  forest: 'forest.jpg',
};
let loaded = 0;
const total = Object.keys(IMG_SRC).length;
Object.entries(IMG_SRC).forEach(([k,src]) => {
  IMG[k] = new Image();
  IMG[k].onload = () => { if(++loaded >= total) boot(); };
  IMG[k].onerror = () => { if(++loaded >= total) boot(); };
  IMG[k].src = src;
});
// Safety net: if some image hangs or never fires, boot anyway after 4s
setTimeout(() => { if(scene==='loading') boot(); }, 4000);

// ── Input ─────────────────────────────────────────────────────────────────────
const K = { up:false, down:false, left:false, right:false };
document.addEventListener('keydown', e => {
  if(['ArrowUp','w','W'].includes(e.key))    K.up=true;
  if(['ArrowDown','s','S'].includes(e.key))  K.down=true;
  if(['ArrowLeft','a','A'].includes(e.key))  K.left=true;
  if(['ArrowRight','d','D'].includes(e.key)) K.right=true;
  if(e.key==='Enter') tap();
  if([' ','j','J','k','K'].includes(e.key)) { if(scene==='level') doAttack(); else tap(); }
});
document.addEventListener('keyup', e => {
  if(['ArrowUp','w','W'].includes(e.key))    K.up=false;
  if(['ArrowDown','s','S'].includes(e.key))  K.down=false;
  if(['ArrowLeft','a','A'].includes(e.key))  K.left=false;
  if(['ArrowRight','d','D'].includes(e.key)) K.right=false;
});
cv.addEventListener('click', e => {
  const r=cv.getBoundingClientRect();
  tap((e.clientX-r.left)*W/r.width, (e.clientY-r.top)*H/r.height);
});

// ── MOBA-style touch controls (王者荣耀 layout, drawn inside the scene) ─────────
//   left half  = virtual joystick (appears where the thumb lands)
//   right side = ⚔️ attack button
const JOY = { active:false, id:null, bx:0, by:0, x:0, y:0 };
const ATK_BTN = { x:W-72, y:H-84, r:46 };
function canvasXY(e){
  const r=cv.getBoundingClientRect();
  return [(e.clientX-r.left)*W/r.width, (e.clientY-r.top)*H/r.height];
}
cv.addEventListener('pointerdown', e => {
  e.preventDefault(); ac();
  if(scene!=='level') return;
  const [x,y]=canvasXY(e);
  if(shopOpen){ handleShopTap(x,y); return; }        // shop swallows all taps
  if(Math.hypot(x-SHOP_BTN.x, y-SHOP_BTN.y)<SHOP_BTN.r+8){ shopOpen=true; return; }
  if(x < W*0.52 && !JOY.active){                    // left thumb → joystick
    JOY.active=true; JOY.id=e.pointerId;
    JOY.bx=x; JOY.by=y; JOY.x=x; JOY.y=y;
  } else {                                          // right side → attack
    doAttack();
  }
});
cv.addEventListener('pointermove', e => {
  if(!JOY.active || e.pointerId!==JOY.id) return;
  const [x,y]=canvasXY(e);
  JOY.x=x; JOY.y=y;
});
['pointerup','pointercancel'].forEach(ev =>
  cv.addEventListener(ev, e => { if(e.pointerId===JOY.id){ JOY.active=false; JOY.id=null; } }));

// ── Sound effects (WebAudio, fully synthesized — no audio files) ───────────────
let AC=null;
function ac() {
  if(!AC) { try { AC=new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return null; } }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
// one enveloped oscillator note
function tone(freq, dur, type='sine', vol=0.18, delay=0, slide=0) {
  const a=ac(); if(!a) return;
  const t0=a.currentTime+delay;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(a.destination);
  o.start(t0); o.stop(t0+dur+0.05);
}
const sfx = {
  collect(){ tone(880,.10,'sine',.22); tone(1318,.14,'sine',.16,.06); },          // sparkly ding
  hurt(){ tone(200,.22,'sawtooth',.25,0,-120); tone(90,.25,'square',.12,.02,-30); }, // low thud
  goal(){ [523,659,784,1047].forEach((f,i)=>tone(f,.16,'triangle',.2,i*.09)); },   // portal opens
  clear(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,.22,'triangle',.22,i*.11)); }, // fanfare
  win(){ [523,659,784,1047,784,1047,1319,1568].forEach((f,i)=>tone(f,.25,'triangle',.22,i*.13)); },
  fall(){ tone(900,.7,'sine',.2,0,-750); },                                        // whoosh down
  start(){ tone(300,.5,'sawtooth',.15,0,500); tone(150,.6,'triangle',.12,.05,300); }, // tornado rise
  die(){ [392,330,262,196].forEach((f,i)=>tone(f,.22,'triangle',.2,i*.12)); },     // sad descend
  attack(){ tone(1400,.08,'square',.10,0,-800); tone(700,.10,'sine',.12,.01,-200); }, // magic swish
  hitm(){ tone(260,.09,'square',.18,0,-80); },                                     // monster hit
  mdie(){ tone(500,.12,'triangle',.2,0,-300); tone(760,.18,'sine',.14,.05,-400); },// monster defeated
  buy(){ [784,1047,1319].forEach((f,i)=>tone(f,.12,'sine',.2,i*.07)); },           // cash register ding
  deny(){ tone(180,.16,'square',.15,0,-40); tone(140,.18,'square',.12,.1,-30); },  // can't afford
};

// ── Level configs ─────────────────────────────────────────────────────────────
const LEVELS = [

  { name:'深海冒险', bg:'ocean',  need:6, obsCount:6, obsType:'jelly', hY:250,
    transMsg:'茶茶骑上海马，在深海里冒险！\n击退水母，收集珍珠！',
    clearMsg:'茶茶游上了岸，眼前是滚烫的大沙漠！' },
  { name:'沙漠旅途', bg:'desert', need:6, obsCount:8, obsType:'cactus', hY:230,
    transMsg:'茶茶骑上骆驼穿越大沙漠！\n打败沙漠旅人，穿过仙人掌阵！',
    clearMsg:'穿过沙漠！远处传来冰雪的寒意……' },
  { name:'冰雪王国', bg:'ice',    need:6, obsCount:8, obsType:'snowman', hY:245,
    transMsg:'茶茶骑着白鹿进入冰雪王国！\n击碎雪人和冰刺，杀出一条路！',
    clearMsg:'冰雪消融，前方是神秘的魔法森林！' },
  { name:'魔法森林', bg:'forest', need:7, obsCount:9, obsType:'tiger', hY:255,
    transMsg:'最后一关！茶茶进入魔法森林！\n战胜老虎，走向回家的花拱门！',
    clearMsg:'' },
];

// ── Pseudo-3D projection with a follow camera ──────────────────────────────────
// World space: u ∈ [-1,1] across the road, z ∈ [0,1] into the scene (1 = the
// portal). The camera dollies forward with 茶茶 (camZ), the photo zooms toward
// its own vanishing point, so SHE stays the same size and the WORLD moves.
const PK=3.2;                                    // perspective strength
const pOf = z => 1/(1+PK*z);
const P1  = pOf(1);
let camZ=0;                                      // camera depth (follows player)
const camZoom = () => (1+PK)/(1+PK*(1-camZ));    // photo zoom for current camera
function proj(u, z) {
  const cfg=LEVELS[lvIdx], nY=H-70;
  const zoom=camZoom(), pcY=cfg.hY-58;           // zoom anchor = portal center
  const hYd = pcY + (cfg.hY-pcY)*zoom;           // portal ground line, zoomed
  const rel = Math.max(0, z-camZ);
  const p   = pOf(rel);
  const pPortal = pOf(1-camZ);
  const pnn = Math.max(0,(p-pPortal)/(1-pPortal)); // 1 at camera → 0 at portal
  const halfFar = 52*zoom;
  const half = halfFar + (198-halfFar)*pnn;
  return {
    x: W/2 + u*half,
    y: hYd + (nY-hYd)*pnn,
    s: 0.24 + 0.80*((p-P1)/(1-P1)),              // absolute depth scale
    pn: pnn, half
  };
}
function unproj(sxx, syy) {                       // screen → world (for drag)
  const cfg=LEVELS[lvIdx], nY=H-70;
  const zoom=camZoom(), pcY=cfg.hY-58;
  const hYd = pcY + (cfg.hY-pcY)*zoom;
  const pnn = Math.max(0, Math.min(1, (syy-hYd)/(nY-hYd)));
  const pPortal = pOf(1-camZ);
  const p = pPortal+(1-pPortal)*pnn;
  const z = Math.max(0.02, Math.min(0.97, (1/p-1)/PK + camZ));
  const halfFar = 52*zoom;
  const half = halfFar + (198-halfFar)*pnn;
  const u = Math.max(-1, Math.min(1, (sxx-W/2)/half));
  return {u, z};
}

// ── Game state ────────────────────────────────────────────────────────────────
let scene = 'loading'; // loading | intro | trans | level | win
let lvIdx = 0;
let tick = 0;
let introPhase = 0; // 0=title, 1=tornado
let introT = 0;
let transT = 0;
let winT = 0;

// Player — lives in world (u,z) space; x/y are the projected screen coords
const PL = { u:0, z:0.08, x:0, y:0, w:34, h:46, spd:3.8, inv:0, dir:1, atkCd:0, shield:0 };
let monsters = [], shots = [], spawnTimer = 0;

// ── Photo-hero sprites ─────────────────────────────────────────────────────────
// Each level's heroine (with her mount) is CUT OUT of the level photo itself and
// becomes the sprite you control. `x/y/w/h` are fractions of the source image,
// `patch` says where to sample background texture to cover her original spot,
// `dh` is the on-canvas display height.
const HERO_RECT = {
  garden: { x:0.330, y:0.185, w:0.400, h:0.700, patch:{dx:-0.31, dy: 0.10}, dh:150 },
  cloud:  { x:0.385, y:0.360, w:0.235, h:0.305, patch:{dx:-0.26, dy: 0.03}, dh:112 },
  ocean:  { x:0.310, y:0.380, w:0.285, h:0.295, patch:{dx:-0.29, dy: 0.02}, dh:118 },
  desert: { x:0.285, y:0.395, w:0.330, h:0.345, patch:{dx:-0.27, dy: 0.05}, dh:126 },
  ice:    { x:0.285, y:0.380, w:0.330, h:0.340, patch:{dx:-0.27, dy: 0.04}, dh:126 },
  forest: { x:0.415, y:0.380, w:0.205, h:0.225, patch:{dx: 0.32, dy: 0.02}, dh:100 },
};
let heroSpr=null, patchSpr=null, heroAspect=1, heroDH=110;
// garden sprite for the intro "swept away by the tornado" animation
let gardenSpr=null, gardenPatch=null, gardenAspect=1;

// The energy orbs and obstacles are ALSO cut from each photo, so what you
// collect and fight is literally what appears in the pictures.
const SPRITE_RECT = {
  cloud:  { orb:{x:.204,y:.674,w:.082,h:.062}, mon:{x:.018,y:.537,w:.140,h:.096} },
  ocean:  { orb:{x:.828,y:.335,w:.112,h:.082}, mon:{x:.780,y:.135,w:.145,h:.125} },
  desert: { orb:{x:.452,y:.808,w:.142,h:.102}, mon:{x:.215,y:.685,w:.110,h:.185}, stat:{x:.185,y:.385,w:.145,h:.225} },
  ice:    { orb:{x:.565,y:.725,w:.125,h:.093}, mon:{x:.875,y:.455,w:.090,h:.088}, stat:{x:.830,y:.815,w:.160,h:.100} },
  forest: { orb:{x:.150,y:.738,w:.064,h:.058}, mon:{x:.505,y:.585,w:.280,h:.160}, stat:{x:.878,y:.600,w:.062,h:.064} },
};
let orbSpr=null, monSpr=null, statSpr=null, orbAsp=1, monAsp=1, statAsp=1;

// Crop a region of img into an offscreen canvas with a soft elliptical
// feathered edge, so the cut-out blends into the scene instead of looking
// like a rectangular sticker.
function maskCrop(img, sx, sy, sw, sh) {
  const c=document.createElement('canvas');
  c.width=Math.round(sw); c.height=Math.round(sh);
  const g=c.getContext('2d');
  g.drawImage(img, sx, sy, sw, sh, 0, 0, c.width, c.height);
  g.globalCompositeOperation='destination-in';
  g.translate(c.width/2, c.height/2);
  g.scale(1, c.height/c.width);          // make the radial gradient elliptical
  const rg=g.createRadialGradient(0,0,0, 0,0,c.width/2);
  rg.addColorStop(0,'rgba(0,0,0,1)');
  rg.addColorStop(0.68,'rgba(0,0,0,1)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=rg;
  g.fillRect(-c.width/2, -c.width/2, c.width, c.width);
  return c;
}

function buildHero(cfg) {
  heroSpr=null; patchSpr=null; orbSpr=null; monSpr=null; statSpr=null;
  const img=IMG[cfg.bg], R=HERO_RECT[cfg.bg];
  if(!img || !img.naturalWidth || !R) return;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const sw=R.w*iw, sh=R.h*ih;
  heroSpr  = maskCrop(img, R.x*iw, R.y*ih, sw, sh);
  patchSpr = maskCrop(img, (R.x+R.patch.dx)*iw, (R.y+R.patch.dy)*ih, sw, sh);
  heroAspect = sw/sh;
  heroDH = R.dh;
  // photo-native collectibles & obstacles
  const S=SPRITE_RECT[cfg.bg];
  if(S){
    if(S.orb){ orbSpr =maskCrop(img,S.orb.x*iw, S.orb.y*ih, S.orb.w*iw, S.orb.h*ih); orbAsp =S.orb.w*iw/(S.orb.h*ih); }
    if(S.mon){ monSpr =maskCrop(img,S.mon.x*iw, S.mon.y*ih, S.mon.w*iw, S.mon.h*ih); monAsp =S.mon.w*iw/(S.mon.h*ih); }
    if(S.stat){ statSpr=maskCrop(img,S.stat.x*iw,S.stat.y*ih,S.stat.w*iw,S.stat.h*ih); statAsp=S.stat.w*iw/(S.stat.h*ih); }
  }
}

// Cover the heroine's original printed position with nearby texture so she
// doesn't appear twice (once frozen in the photo + once as the sprite).
function drawHeroPatch() {
  const img=IMG[LEVELS[lvIdx].bg], R=HERO_RECT[LEVELS[lvIdx].bg];
  if(!patchSpr || !img || !img.naturalWidth || !R) return;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  // use the exact transform drawBg just used, so the patch tracks the zoom
  const dx=BGT.ox+R.x*iw*BGT.sc, dy=BGT.oy+R.y*ih*BGT.sc, dw=R.w*iw*BGT.sc, dh=R.h*ih*BGT.sc;
  // draw slightly enlarged, twice, so the feathered edges fully cover her
  cx.drawImage(patchSpr, dx-dw*0.05, dy-dh*0.05, dw*1.1, dh*1.1);
  cx.drawImage(patchSpr, dx-dw*0.02, dy-dh*0.02, dw*1.04, dh*1.04);
}

// Level objects
let orbs = [], obstacles = [], ptcs = [];
let collected = 0, goalOpen = false, lvDone = false, hitFlash = 0, lives = 6, lvDoneT = 0;

// ── Saved progress (localStorage) ──────────────────────────────────────────────
const SAVE_KEY='chacha_progress';
function loadProgress(){ const v=parseInt(localStorage.getItem(SAVE_KEY)||'0',10); return (v>0&&v<LEVELS.length)?v:0; }
function saveProgress(i){ try{ localStorage.setItem(SAVE_KEY,String(Math.max(i,loadProgress()))); }catch(e){} }
function clearProgress(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

// ── Coins, weapon level & the item shop ────────────────────────────────────────
let coins    = parseInt(localStorage.getItem('chacha_coins')||'30',10);   // start with pocket money
let weaponLv = Math.min(3, parseInt(localStorage.getItem('chacha_weapon')||'1',10));
let shopOpen = false;
let floatTexts = [];                                   // "+5 🪙" popups
function saveWallet(){ try{
  localStorage.setItem('chacha_coins', String(coins));
  localStorage.setItem('chacha_weapon', String(weaponLv));
}catch(e){} }
function addCoins(n, x, y){
  coins+=n; saveWallet();
  if(x!==undefined) floatTexts.push({x, y, txt:`+${n}🪙`, life:50});
}
const SHOP_ITEMS = [
  { icon:'❤️', name:'补满生命', desc:'爱心全部恢复',       price:30,
    can:()=>lives<6,        buy:()=>{ lives=6; } },
  { icon:'⚔️', name:'升级魔法星', desc:'攻击更猛，冷却更快', price:()=>weaponLv===1?50:120,
    can:()=>weaponLv<3,     buy:()=>{ weaponLv++; saveWallet(); } },
  { icon:'🛡️', name:'魔法护盾', desc:'10秒无敌不掉血',     price:40,
    can:()=>PL.shield<=0,   buy:()=>{ PL.shield=600; } },
];
const SHOP_BTN = { x:W-30, y:92, r:22 };
function shopPanelRect(){ return { x:W/2-175, y:H/2-205, w:350, h:400 }; }
function handleShopTap(x, y){
  const p=shopPanelRect();
  // close: ✕ button or anywhere outside the panel
  if(Math.hypot(x-(p.x+p.w-26), y-(p.y+30))<20 || x<p.x||x>p.x+p.w||y<p.y||y>p.y+p.h){
    shopOpen=false; return;
  }
  for(let i=0;i<SHOP_ITEMS.length;i++){
    const ry=p.y+120+i*92;
    if(y>ry-40 && y<ry+40 && x>p.x+16 && x<p.x+p.w-16){
      const it=SHOP_ITEMS[i];
      const price=typeof it.price==='function'?it.price():it.price;
      if(it.can() && coins>=price){
        coins-=price; it.buy(); saveWallet(); sfx.buy();
        floatTexts.push({x:PL.x||W/2, y:PL.y||H/2, txt:`${it.icon} 购买成功!`, life:60});
      } else {
        sfx.deny();
      }
      return;
    }
  }
}

// ── Tap handler (coordinate-aware, for the continue / restart choice) ─────────
function tap(tx=W/2, ty=H/2) {
  ac();                                     // unlock audio on first gesture
  if(scene==='intro' && introPhase===0) {
    const saved=loadProgress();
    if(saved>0 && ty>H/2+72 && ty<H/2+112) {  // "重新开始" zone
      clearProgress();
      introPhase=1; introT=0; sfx.start();
    } else if(saved>0) {                       // continue where she left off
      sfx.goal();
      scene='trans'; transT=0; lvIdx=saved-1;
    } else {
      introPhase=1; introT=0; sfx.start();     // fresh adventure → tornado
    }
  }
  else if(scene==='win' && winT > 80) { resetGame(); }
}

function resetGame() {
  scene='intro'; introPhase=0; introT=0; lvIdx=0;
}

// ── Start level ───────────────────────────────────────────────────────────────
function startLevel(i) {
  lvIdx = i;
  const cfg = LEVELS[i];
  PL.u=0; PL.z=0.08; PL.inv=0; PL.dir=1; PL.atkCd=0; PL.shield=0; camZ=0;
  shopOpen=false; floatTexts=[];
  buildHero(cfg);                     // cut the heroine out of this level's photo
  saveProgress(i);                    // remember how far she has come
  orbs=[]; obstacles=[]; monsters=[]; shots=[]; ptcs=[];
  collected=0; goalOpen=false; lvDone=false; hitFlash=0; lives=6; lvDoneT=0;

  // Energy orbs scattered along the 3D road
  const orbN = cfg.need + Math.floor(Math.random()*3) + 2;
  for(let j=0; j<orbN; j++)
    orbs.push({ u:-0.85+Math.random()*1.7, z:0.12+Math.random()*0.72,
                r:16, alive:true, phase:Math.random()*Math.PI*2 });

  // Monsters guard the road — mobile ones chase, static ones block
  for(let j=0; j<cfg.obsCount; j++) spawnMonster(j%5>=3);
  spawnTimer=0;
  scene='level';
}

// ── Spawn one monster on the road, away from 茶茶 ──────────────────────────────
function spawnMonster(preferStatic) {
  const cfg=LEVELS[lvIdx];
  const diff = 1 + lvIdx*0.12;        // later levels: faster monsters
  const mobileOf = { wand:'wand', jelly:'jelly', cactus:'person', snowman:'snowman', tiger:'tiger' };
  const staticOf = { wand:null,   jelly:null,    cactus:'cactus', snowman:'spike',   tiger:'mushroom' };
  const stat = staticOf[cfg.obsType] && preferStatic;
  const variant = stat ? staticOf[cfg.obsType] : mobileOf[cfg.obsType];
  let mu, mz, tries=0;
  do {
    mu=-0.8+Math.random()*1.6;
    mz=Math.max(0.14, Math.min(0.88, camZ+0.10+Math.random()*0.72));
  } while(Math.hypot(mu-PL.u, (mz-PL.z)*3) < 0.5 && ++tries<20);
  const m={
    u:mu, z:mz, homeU:mu, variant,
    hp: stat?2:3, maxHp: stat?2:3,
    spd:(0.0012+Math.random()*0.0014)*diff,
    aggro:0.22+Math.random()*0.10,      // small, varied detection range
    mobile:!stat, wob:Math.random()*Math.PI*2,
    flash:0, alive:true,
  };
  monsters.push(m);
  return m;
}

// ── Attack: 茶茶 fires a magic star forward ─────────────────────────────────────
function doAttack() {
  if(scene!=='level' || lvDone || shopOpen || PL.atkCd>0) return;
  PL.atkCd=21-weaponLv*3;                        // higher weapon = faster attacks
  sfx.attack();
  // aim at the nearest living monster ahead-ish, else straight forward
  let best=null, bd=1e9;
  for(const m of monsters){
    if(!m.alive) continue;
    const d=Math.hypot((m.u-PL.u)*1.4, (m.z-PL.z)*4);
    if(d<bd){ bd=d; best=m; }
  }
  shots.push({ u:PL.u, z:PL.z+0.03, target:best, life:70, dmg:weaponLv });
  // Lv3 fires a spread of three stars
  if(weaponLv>=3){
    shots.push({ u:PL.u-0.16, z:PL.z+0.03, target:best, life:70, dmg:weaponLv });
    shots.push({ u:PL.u+0.16, z:PL.z+0.03, target:best, life:70, dmg:weaponLv });
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
let booted = false;
function boot() {
  if(booted) return;            // guard: only boot once
  booted = true;
  // cut 茶茶 out of the garden photo for the tornado lift-off animation
  const g=IMG.garden, R=HERO_RECT.garden;
  if(g && g.naturalWidth) {
    const iw=g.naturalWidth, ih=g.naturalHeight, sw=R.w*iw, sh=R.h*ih;
    gardenSpr   = maskCrop(g, R.x*iw, R.y*ih, sw, sh);
    gardenPatch = maskCrop(g, (R.x+R.patch.dx)*iw, (R.y+R.patch.dy)*ih, sw, sh);
    gardenAspect = sw/sh;
  }
  scene='intro'; introPhase=0; introT=0;
  // NOTE: render loop is already running (started at bottom of script);
  // do NOT start a second requestAnimationFrame here.
}

// ── Drawing helpers ───────────────────────────────────────────────────────────
// Current background transform (scale + offset), shared with drawHeroPatch so
// the patch stays glued to the photo while the camera zooms in.
const BGT = { sc:1, ox:0, oy:0 };
function drawBg(key) {
  const img = IMG[key];
  if(!img || !img.naturalWidth) { cx.fillStyle='#111'; cx.fillRect(0,0,W,H); return; }
  const sc = Math.max(W/img.naturalWidth, H/img.naturalHeight);
  let ox=(W-img.naturalWidth*sc)/2, oy=(H-img.naturalHeight*sc)/2, S=sc;
  if(scene==='level') {
    // dolly-zoom into the photo's vanishing point as the camera follows 茶茶
    const zoom=camZoom(), ax=W/2, ay=LEVELS[lvIdx].hY-58;
    S = sc*zoom;
    ox = ax + (ox-ax)*zoom;
    oy = ay + (oy-ay)*zoom;
  }
  BGT.sc=S; BGT.ox=ox; BGT.oy=oy;
  cx.drawImage(img, ox, oy, img.naturalWidth*S, img.naturalHeight*S);
}

function vignette(strength=0.55) {
  const g = cx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
  g.addColorStop(0,'transparent'); g.addColorStop(1,`rgba(0,0,0,${strength})`);
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
}

function starPath(cx2, cx_, cy, spikes, ro, ri) {
  let ang = -Math.PI/2, step = Math.PI/spikes;
  cx2.beginPath();
  for(let i=0;i<spikes;i++){
    cx2.lineTo(cx_+Math.cos(ang)*ro, cy+Math.sin(ang)*ro); ang+=step;
    cx2.lineTo(cx_+Math.cos(ang)*ri, cy+Math.sin(ang)*ri); ang+=step;
  }
  cx2.closePath();
}

// ── Draw player ───────────────────────────────────────────────────────────────
// The heroine cut straight out of the level photo, riding her mount, bobbing
// as she moves. Falls back to the hand-drawn girl if the crop isn't ready.
function drawPlayer() {
  const {x,y,inv,dir} = PL;
  if(inv>0 && Math.floor(inv/5)%2===1) return;
  if(!heroSpr) { drawVectorPlayer(); return; }

  const depth = proj(PL.u, PL.z).s;              // near = big, far = small
  const dh=heroDH*depth, dw=dh*heroAspect;
  const moving = K.up||K.down||K.left||K.right||JOY.active;
  const bob  = (moving ? Math.sin(tick*0.25)*3.5 : Math.sin(tick*0.07)*1.5)*depth;
  const tilt = (K.left?-1:K.right?1:0)*0.055;

  // ground shadow
  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(x, y+dh*0.44, dw*0.30, 8*depth, 0, 0, Math.PI*2); cx.fill();

  cx.save();
  cx.translate(x, y+bob);
  cx.rotate(tilt);
  if(dir===1) cx.scale(-1,1);   // source photos face left; flip when heading right
  cx.drawImage(heroSpr, -dw/2, -dh*0.52, dw, dh);
  cx.restore();

  // magic shield bubble
  if(PL.shield>0){
    const sr=dw*0.62+Math.sin(tick*0.15)*3;
    const fading = PL.shield<120 && Math.floor(PL.shield/8)%2===0;  // blink before expiring
    if(!fading){
      cx.save();
      const sg=cx.createRadialGradient(x,y-dh*0.1,sr*0.5,x,y-dh*0.1,sr);
      sg.addColorStop(0,'rgba(120,220,255,0)');
      sg.addColorStop(0.8,'rgba(120,220,255,0.14)');
      sg.addColorStop(1,'rgba(160,240,255,0.55)');
      cx.fillStyle=sg;
      cx.beginPath(); cx.arc(x,y-dh*0.1,sr,0,Math.PI*2); cx.fill();
      cx.strokeStyle='rgba(190,245,255,0.8)'; cx.lineWidth=2;
      cx.beginPath(); cx.arc(x,y-dh*0.1,sr,0,Math.PI*2); cx.stroke();
      cx.restore();
    }
  }
}

function drawVectorPlayer() {
  const {x,y,w,h,inv,dir} = PL;

  cx.save();
  cx.scale(dir,1);
  const px = x*dir;

  // Shadow
  cx.fillStyle='rgba(0,0,0,0.22)';
  cx.beginPath(); cx.ellipse(px,y+h*0.52,w*0.38,7,0,0,Math.PI*2); cx.fill();

  // Legs
  cx.fillStyle='#fff';
  cx.fillRect(px-11,y+h*0.46,9,18);
  cx.fillRect(px+2,y+h*0.46,9,18);
  // Shoes
  cx.fillStyle='#FF6699';
  cx.fillRect(px-13,y+h*0.46+16,11,6);
  cx.fillRect(px+2,y+h*0.46+16,11,6);

  // Dress body
  cx.fillStyle='#FFB7C5';
  cx.beginPath();
  cx.moveTo(px-w*0.36,y+h*0.12);
  cx.bezierCurveTo(px-w*0.44,y+h*0.3,px-w*0.44,y+h*0.42,px-w*0.38,y+h*0.5);
  cx.lineTo(px+w*0.38,y+h*0.5);

  cx.closePath(); cx.fill();

  // Skirt flare
  cx.fillStyle='#FF8FAB';
  cx.beginPath();
  cx.moveTo(px-w*0.38,y+h*0.3);
  cx.lineTo(px-w*0.52,y+h*0.5);
  cx.lineTo(px+w*0.52,y+h*0.5);
  cx.lineTo(px+w*0.38,y+h*0.3);
  cx.closePath(); cx.fill();

  // Collar detail
  cx.fillStyle='rgba(255,255,255,0.5)';
  cx.beginPath();
  cx.moveTo(px-8,y+h*0.12); cx.lineTo(px,y+h*0.22); cx.lineTo(px+8,y+h*0.12);

  // Head
  cx.fillStyle='#FFDAB9';

  // Hair (blue-teal)
  cx.fillStyle='#5BAFD6';
  cx.beginPath();
  cx.arc(px,y-h*0.18,w*0.32,Math.PI,0); cx.fill();
  cx.fillRect(px-w*0.32,y-h*0.18,7,20);
  cx.fillRect(px+w*0.25,y-h*0.18,7,20);
  // Hair flower
  cx.fillStyle='#FF6699';
  cx.beginPath(); cx.arc(px+w*0.22,y-h*0.25,5,0,Math.PI*2); cx.fill();

  // Eyes
  cx.fillStyle='#4455CC';
  cx.beginPath(); cx.arc(px-7,y-h*0.11,3,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(px+7,y-h*0.11,3,0,Math.PI*2); cx.fill();
  // Eye shine
  cx.fillStyle='white';
  cx.beginPath(); cx.arc(px-6,y-h*0.125,1.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(px+8,y-h*0.125,1.2,0,Math.PI*2); cx.fill();

  // Cheeks
  cx.fillStyle='rgba(255,130,150,0.35)';
  cx.beginPath(); cx.ellipse(px-11,y-h*0.06,5,3,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(px+11,y-h*0.06,5,3,0,0,Math.PI*2); cx.fill();

  // Mouth
  cx.strokeStyle='#CC5577'; cx.lineWidth=1.5;
  cx.beginPath(); cx.arc(px,y-h*0.02,4,0.2,Math.PI-0.2); cx.stroke();

  cx.restore();
}

// ── "Collect me!" beacon drawn behind every collectible so it never
//    blends into a busy background ──────────────────────────────────────────────
function drawCollectBeacon(r) {
  // Soft dark separation halo — makes the orb pop on BRIGHT bgs (clouds/desert/snow)
  const dh=cx.createRadialGradient(0,0,r*0.7,0,0,r*2.8);
  dh.addColorStop(0,'rgba(0,0,0,0)'); dh.addColorStop(0.55,'rgba(0,0,0,0.30)'); dh.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=dh; cx.beginPath(); cx.arc(0,0,r*2.8,0,Math.PI*2); cx.fill();
  // Bright pulsing target ring — dark under-stroke + white over-stroke so it
  // reads on ANY background (bright clouds/snow OR dark forest/ocean)
  const rp=Math.max(4, r*1.75+Math.sin(tick*0.12)*3);
  cx.save();
  cx.strokeStyle='rgba(0,0,0,0.4)'; cx.lineWidth=5;
  cx.beginPath(); cx.arc(0,0,rp,0,Math.PI*2); cx.stroke();
  cx.shadowColor='rgba(255,255,255,0.95)'; cx.shadowBlur=10;
  cx.strokeStyle='rgba(255,255,255,0.95)'; cx.lineWidth=2.5;
  cx.beginPath(); cx.arc(0,0,rp,0,Math.PI*2); cx.stroke();
  cx.restore();
  // Orbiting sparkle dots to draw the eye
  for(let i=0;i<3;i++){
    const a=tick*0.05+i*Math.PI*2/3;
    cx.fillStyle='rgba(255,255,255,0.95)';
    cx.shadowColor='rgba(255,255,255,0.9)'; cx.shadowBlur=6;
    cx.beginPath(); cx.arc(Math.cos(a)*rp,Math.sin(a)*rp,2.4,0,Math.PI*2); cx.fill();
  }
  cx.shadowBlur=0;
}

// ── Draw orb at projected screen pos, scaled by depth ─────────────────────────
function drawOrb(o, sx, sy, s) {
  if(!o.alive) return;
  const pulse=Math.sin(tick*0.055+o.phase)*0.18;
  const r=o.r*(1+pulse);
  const bob=Math.sin(tick*0.08+o.phase)*3;         // gentle float to catch the eye
  cx.save(); cx.translate(sx, sy+bob*s); cx.scale(s,s);
  drawCollectBeacon(r);                             // beacon first, behind the gem
  if(orbSpr){
    // the real energy orb cropped from this level's photo
    const dh=r*2.9, dw=dh*orbAsp;
    cx.drawImage(orbSpr, -dw/2, -dh/2, dw, dh);
    cx.restore(); return;
  }
  switch(lvIdx) {
    case 0: { // Cloud - Rainbow spinning star gem
      const hue=(tick*2.5+o.phase*60)%360;
      cx.shadowColor=`hsl(${hue},100%,65%)`; cx.shadowBlur=18;
      const sg=cx.createRadialGradient(-r*0.2,-r*0.2,0,0,0,r*1.2);
      sg.addColorStop(0,`hsl(${hue},100%,88%)`); sg.addColorStop(0.5,`hsl(${(hue+60)%360},100%,62%)`); sg.addColorStop(1,`hsl(${(hue+120)%360},80%,38%)`);
      cx.fillStyle=sg; starPath(cx,0,0,6,r*1.1,r*0.5); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.7)'; cx.beginPath(); cx.arc(-r*0.2,-r*0.25,r*0.22,0,Math.PI*2); cx.fill();
      cx.shadowBlur=0; break;
    }
    case 1: { // Ocean - Pearl bubble
      cx.shadowColor='rgba(200,220,255,0.6)'; cx.shadowBlur=14;
      const pg=cx.createRadialGradient(-r*0.25,-r*0.3,0,0,0,r);
      pg.addColorStop(0,'rgba(255,255,255,0.95)'); pg.addColorStop(0.3,'rgba(220,240,255,0.8)'); pg.addColorStop(0.7,'rgba(180,210,255,0.5)'); pg.addColorStop(1,'rgba(140,180,230,0.2)');
      cx.fillStyle=pg; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
      cx.strokeStyle=`hsla(${(tick*3)%360},70%,70%,0.7)`; cx.lineWidth=2; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.stroke();
      cx.fillStyle='rgba(255,255,255,0.85)'; cx.beginPath(); cx.ellipse(-r*0.3,-r*0.35,r*0.22,r*0.14,-0.5,0,Math.PI*2); cx.fill();
      cx.shadowBlur=0; break;
    }
    case 2: { // Desert - Faceted crystal gem
      const gemHues=[340,50,120,200,270]; const gemHue=gemHues[Math.floor(o.phase*5)%5];
      cx.shadowColor=`hsla(${gemHue},100%,60%,0.7)`; cx.shadowBlur=14;
      const gg=cx.createLinearGradient(0,-r,0,r);
      gg.addColorStop(0,`hsl(${gemHue},100%,85%)`); gg.addColorStop(0.4,`hsl(${gemHue},90%,55%)`); gg.addColorStop(1,`hsl(${gemHue},80%,30%)`);
      cx.fillStyle=gg;
      cx.beginPath(); cx.moveTo(0,-r*1.1); cx.lineTo(r*0.8,-r*0.2); cx.lineTo(0,r*1.1); cx.lineTo(-r*0.8,-r*0.2); cx.closePath(); cx.fill();
      cx.fillStyle=`hsla(${gemHue},100%,75%,0.55)`;
      cx.beginPath(); cx.moveTo(0,-r*1.1); cx.lineTo(r*0.8,-r*0.2); cx.lineTo(0,-r*0.1); cx.closePath(); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.5)';
      cx.beginPath(); cx.moveTo(0,-r*1.1); cx.lineTo(-r*0.8,-r*0.2); cx.lineTo(0,-r*0.1); cx.closePath(); cx.fill();
      cx.fillStyle='white'; cx.shadowColor='white'; cx.shadowBlur=8; cx.beginPath(); cx.arc(-r*0.15,-r*0.6,r*0.15,0,Math.PI*2); cx.fill();
      cx.shadowBlur=0; break;
    }
    case 3: { // Ice - Hexagonal ice crystal
      cx.shadowColor='rgba(100,220,255,0.9)'; cx.shadowBlur=18;
      const ig=cx.createRadialGradient(0,0,0,0,0,r);
      ig.addColorStop(0,'rgba(220,248,255,0.95)'); ig.addColorStop(0.5,'rgba(140,210,250,0.8)'); ig.addColorStop(1,'rgba(80,170,230,0.6)');
      cx.fillStyle=ig; cx.beginPath();
      for(let i=0;i<6;i++){ const a=i*Math.PI/3-Math.PI/6; i===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r); }
      cx.closePath(); cx.fill();
      cx.fillStyle='rgba(200,240,255,0.5)'; cx.beginPath();
      for(let i=0;i<6;i++){ const a=i*Math.PI/3-Math.PI/6; i===0?cx.moveTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5):cx.lineTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5); }
      cx.closePath(); cx.fill();
      cx.strokeStyle='rgba(180,230,255,0.7)'; cx.lineWidth=1;
      for(let i=0;i<6;i++){ const a=i*Math.PI/3-Math.PI/6; cx.beginPath(); cx.moveTo(0,0); cx.lineTo(Math.cos(a)*r,Math.sin(a)*r); cx.stroke(); }
      cx.shadowBlur=0; break;
    }
    case 4: { // Forest - Green magic orb
      cx.shadowColor='rgba(50,255,100,0.8)'; cx.shadowBlur=20;
      const fg=cx.createRadialGradient(-r*0.28,-r*0.28,0,0,0,r);
      fg.addColorStop(0,'#C8FFD8'); fg.addColorStop(0.4,'#00EE7A'); fg.addColorStop(0.8,'#006640'); fg.addColorStop(1,'#003820');
      cx.fillStyle=fg; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
      const og=cx.createRadialGradient(0,0,r,0,0,r*2.2);
      og.addColorStop(0,'rgba(50,255,100,0.3)'); og.addColorStop(1,'rgba(50,255,100,0)');
      cx.fillStyle=og; cx.beginPath(); cx.arc(0,0,r*2.2,0,Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.65)'; cx.beginPath(); cx.arc(-r*0.3,-r*0.32,r*0.28,0,Math.PI*2); cx.fill();
      cx.shadowBlur=0; break;
    }
  }
  cx.restore();
}

// ── Draw goal — glows right on the photo's own portal at the end of the road ──
function drawGoal() {
  const gx=W/2, gy=LEVELS[lvIdx].hY-58;
  const gs=0.88*Math.min(camZoom(), 2.6);   // portal marker grows as you approach
  cx.save(); cx.translate(gx,gy); cx.scale(gs,gs);
  if(!goalOpen) {
    cx.fillStyle='rgba(0,0,0,0.4)'; cx.beginPath(); roundRect2(cx,-44,-32,88,62,12); cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.35)'; cx.lineWidth=1.5; cx.beginPath(); roundRect2(cx,-44,-32,88,62,12); cx.stroke();
    cx.fillStyle='rgba(255,255,255,0.8)'; cx.font='bold 12px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText('🔒 终点', 0, -8);
    cx.fillStyle='rgba(200,220,255,0.7)'; cx.font='10px sans-serif'; cx.fillText(`收集${LEVELS[lvIdx].need}个`, 0, 12);
    cx.restore(); return;
  }
  const pulse=1+Math.sin(tick*0.08)*0.1;
  switch(lvIdx) {
    case 0: { // Cloud - Star arch
      cx.shadowColor='#FFD700'; cx.shadowBlur=22;
      for(let i=0;i<9;i++){
        const a=-Math.PI+i*(Math.PI/8), sr=48*pulse;
        const h=(tick*3+i*30)%360;
        cx.fillStyle=`hsl(${h},100%,70%)`;
        starPath(cx,Math.cos(a)*sr,Math.sin(a)*sr,5,10+Math.sin(tick*0.06+i)*3,4); cx.fill();
      }
      const cg=cx.createRadialGradient(0,0,0,0,0,36*pulse);
      cg.addColorStop(0,'rgba(255,255,200,0.95)'); cg.addColorStop(0.4,'rgba(200,180,255,0.7)'); cg.addColorStop(1,'rgba(180,140,255,0)');
      cx.fillStyle=cg; cx.beginPath(); cx.arc(0,0,36*pulse,0,Math.PI*2); cx.fill();
      cx.shadowBlur=0; cx.fillStyle='white'; cx.font='bold 11px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('★ 终点 ★',0,30); break;
    }
    case 1: { // Ocean - Glowing coral arch
      cx.shadowColor='rgba(100,200,255,0.8)'; cx.shadowBlur=25;
      cx.strokeStyle='rgba(100,210,255,0.9)'; cx.lineWidth=6; cx.beginPath(); cx.arc(0,0,44*pulse,Math.PI,0); cx.stroke();
      cx.strokeStyle='rgba(180,240,255,0.5)'; cx.lineWidth=2; cx.beginPath(); cx.arc(0,0,38*pulse,Math.PI,0); cx.stroke();
      const ug=cx.createRadialGradient(0,-10,0,0,-5,40*pulse);
      ug.addColorStop(0,'rgba(200,240,255,0.9)'); ug.addColorStop(1,'rgba(60,160,220,0)');
      cx.fillStyle=ug; cx.beginPath(); cx.arc(0,0,40*pulse,Math.PI,0); cx.fill();
      for(let i=0;i<5;i++){
        const a=-Math.PI+i*(Math.PI/4); cx.fillStyle=`hsla(${180+i*20},100%,75%,0.9)`; cx.shadowColor='rgba(150,240,255,0.8)';
        starPath(cx,Math.cos(a)*44*pulse,Math.sin(a)*44*pulse,5,8,3); cx.fill();
      }
      cx.shadowBlur=0; cx.fillStyle='rgba(200,240,255,0.9)'; cx.font='bold 11px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('⭐ 终点 ⭐',0,30); break;
    }
    case 2: { // Desert - Sandy star portal
      cx.shadowColor='rgba(255,180,50,0.7)'; cx.shadowBlur=20;
      for(let i=0;i<=8;i++){
        const a=-Math.PI+i*(Math.PI/8), ar=46*pulse;
        cx.fillStyle=i%2===0?'#D4A017':'#AA7A10';
        cx.save(); cx.translate(Math.cos(a)*ar,Math.sin(a)*ar); cx.rotate(a+Math.PI/2); cx.fillRect(-8,-6,16,12); cx.restore();
      }
      for(let i=0;i<5;i++){
        const a=-Math.PI*0.85+i*(Math.PI*1.7/4);
        cx.fillStyle='#FFD700'; cx.shadowColor='#FFD700'; cx.shadowBlur=10;
        starPath(cx,Math.cos(a)*46*pulse,Math.sin(a)*46*pulse,5,9,4); cx.fill();
      }
      const dg=cx.createRadialGradient(0,-5,0,0,-5,38*pulse);
      dg.addColorStop(0,'rgba(255,230,150,0.9)'); dg.addColorStop(1,'rgba(255,180,50,0)');
      cx.fillStyle=dg; cx.beginPath(); cx.arc(0,0,38*pulse,Math.PI,0); cx.fill();
      cx.shadowBlur=0; cx.fillStyle='#FFE066'; cx.font='bold 11px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('✨ 终点 ✨',0,30); break;
    }
    case 3: { // Ice - Pointed palace gate
      cx.shadowColor='rgba(150,230,255,0.9)'; cx.shadowBlur=28;
      cx.strokeStyle='rgba(180,235,255,0.9)'; cx.lineWidth=4;
      cx.beginPath(); cx.moveTo(-44*pulse,20); cx.lineTo(-44*pulse,-25); cx.lineTo(0,-55*pulse); cx.lineTo(44*pulse,-25); cx.lineTo(44*pulse,20); cx.stroke();
      const icg=cx.createLinearGradient(0,-50,0,20);
      icg.addColorStop(0,'rgba(200,245,255,0.85)'); icg.addColorStop(1,'rgba(100,200,240,0.3)');
      cx.fillStyle=icg; cx.beginPath(); cx.moveTo(-44*pulse,20); cx.lineTo(-44*pulse,-25); cx.lineTo(0,-55*pulse); cx.lineTo(44*pulse,-25); cx.lineTo(44*pulse,20); cx.closePath(); cx.fill();
      cx.fillStyle='white'; cx.shadowColor='rgba(200,240,255,0.9)'; cx.shadowBlur=10;
      [[0,-42*pulse],[-36*pulse,-5],[36*pulse,-5]].forEach(([sx,sy])=>{
        for(let i=0;i<6;i++){ const a=i*Math.PI/3; cx.strokeStyle='rgba(200,240,255,0.8)'; cx.lineWidth=2; cx.beginPath(); cx.moveTo(sx,sy); cx.lineTo(sx+Math.cos(a)*12,sy+Math.sin(a)*12); cx.stroke(); }
      });
      cx.shadowBlur=0; cx.fillStyle='rgba(220,248,255,0.95)'; cx.font='bold 11px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('❄ 终点 ❄',0,32); break;
    }
    case 4: { // Forest - Flower vine arch
      cx.shadowColor='rgba(100,200,100,0.7)'; cx.shadowBlur=20;
      cx.strokeStyle='#3A7A20'; cx.lineWidth=7; cx.beginPath(); cx.arc(0,0,44*pulse,Math.PI,0); cx.stroke();
      cx.strokeStyle='#5AB040'; cx.lineWidth=3; cx.beginPath(); cx.arc(0,0,44*pulse,Math.PI,0); cx.stroke();
      const flC=['#FF6699','#FFAA00','#FF44AA','#FF99CC','#FFDD44','#AA44FF','#44DDAA'];
      for(let i=0;i<7;i++){
        const a=-Math.PI+i*(Math.PI/6), fr=44*pulse;
        cx.save(); cx.translate(Math.cos(a)*fr,Math.sin(a)*fr);
        cx.fillStyle=flC[i%flC.length];
        for(let p=0;p<5;p++){ const pa=p*Math.PI*2/5; cx.beginPath(); cx.arc(Math.cos(pa)*5,Math.sin(pa)*5,5,0,Math.PI*2); cx.fill(); }
        cx.fillStyle='#FFD700'; cx.beginPath(); cx.arc(0,0,4,0,Math.PI*2); cx.fill(); cx.restore();
      }
      const fgg=cx.createRadialGradient(0,-5,0,0,-5,38*pulse);
      fgg.addColorStop(0,'rgba(180,255,180,0.9)'); fgg.addColorStop(1,'rgba(100,200,100,0)');
      cx.fillStyle=fgg; cx.beginPath(); cx.arc(0,0,38*pulse,Math.PI,0); cx.fill();
      cx.shadowBlur=0; cx.fillStyle='#90EE20'; cx.font='bold 11px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('🌸 终点 🌸',0,30); break;
    }
  }
  cx.restore();
}

// ── Ambient level effects ──────────────────────────────────────────────────────
function drawAmbient(t) {
  switch(lvIdx) {
    case 0: // Cloud - drifting sparkles
      for(let i=0;i<16;i++){
        const x=(t*0.4+i*143)%W, y=(t*0.25+i*97)%H;
        const al=Math.max(0,Math.sin(t*0.06+i)*0.4+0.3), sz=1.4+Math.sin(t*0.05+i*0.7)*1.0;
        cx.fillStyle=`rgba(255,230,100,${al})`; cx.beginPath(); cx.arc(x,y,Math.max(0.2,sz),0,Math.PI*2); cx.fill();
      }
      break;
    case 1: // Ocean - rising bubbles
      for(let i=0;i<14;i++){
        const x=(i*73+131)%W, y=H-((t*0.7+i*97)%(H*1.2)), sz=2+i%4;
        const al=Math.min(y/100,1)*0.45;
        cx.strokeStyle=`rgba(200,240,255,${al})`; cx.lineWidth=1; cx.beginPath(); cx.arc(x,y,sz,0,Math.PI*2); cx.stroke();
      }
      break;
    case 2: // Desert - drifting sand
      for(let i=0;i<22;i++){
        const x=(t*1.5+i*97)%W, y=(i*H/22+Math.sin(t*0.03+i)*20)%H;
        const al=0.12+Math.sin(t*0.04+i)*0.08;
        cx.fillStyle=`rgba(220,190,100,${al})`; cx.beginPath(); cx.arc(x,y,1,0,Math.PI*2); cx.fill();
      }
      break;
    case 3: // Ice - falling snowflakes
      for(let i=0;i<18;i++){
        const x=(i*67+Math.sin(t*0.02+i)*30+(W/2))%W, y=(t*0.6+i*57)%(H+20)-10;
        const al=0.3+Math.sin(t*0.05+i)*0.2;
        cx.save(); cx.globalAlpha=al; cx.font='11px sans-serif'; cx.textAlign='center'; cx.fillStyle='rgba(220,240,255,0.9)';
        cx.fillText('❄',x,y); cx.restore();
      }
      break;
    case 4: // Forest - firefly green dots
      for(let i=0;i<12;i++){
        const x=(i*137+Math.sin(t*0.025+i)*40+80)%W, y=(i*73+Math.cos(t*0.02+i*0.7)*35+200)%(H-100)+100;
        const al=(Math.sin(t*0.07+i*1.3)+1)*0.4;
        cx.shadowColor='rgba(100,255,100,0.8)'; cx.shadowBlur=10;
        cx.fillStyle=`rgba(100,255,100,${al})`; cx.beginPath(); cx.arc(x,y,2.5,0,Math.PI*2); cx.fill();
        cx.shadowBlur=0;
      }
      break;
  }
}

function roundRect2(c,x,y,w,h,r) {
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r); c.closePath();
}

// ── Draw HUD ──────────────────────────────────────────────────────────────────
function drawHUD() {
  const cfg = LEVELS[lvIdx];
  // Bar bg
  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.beginPath(); roundRect2(cx,0,0,W,64,0); cx.fill();

  // Level name
  cx.fillStyle='#FFE066';
  cx.font='bold 16px sans-serif'; cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText(`第 ${lvIdx+1} 关  ${cfg.name}`, 14, 16);

  // Orb count
  cx.fillStyle='white';
  cx.font='bold 16px sans-serif'; cx.textAlign='right';
  cx.fillText(`💎 ${collected} / ${cfg.need}`, W-12, 16);

  // Lives (hearts)
  cx.font='18px sans-serif'; cx.textAlign='left'; cx.textBaseline='middle';
  let heartsStr = '';
  for(let i=0;i<6;i++) heartsStr += (i < lives) ? '❤️' : '🖤';
  cx.fillText(heartsStr, 12, 38);

  // Coin purse
  cx.font='bold 15px sans-serif'; cx.textAlign='right'; cx.fillStyle='#FFE066';
  cx.fillText(`🪙 ${coins}`, W-12, 38);

  // Progress bar
  const barX=14, barY=52, barW=W-28, barH=8;
  cx.fillStyle='rgba(255,255,255,0.15)';
  cx.beginPath(); roundRect2(cx,barX,barY,barW,barH,5); cx.fill();
  const pct = Math.min(collected/cfg.need,1);
  if(pct>0){
    const g = cx.createLinearGradient(barX,0,barX+barW,0);
    g.addColorStop(0,'#00FF88'); g.addColorStop(1,'#00BBFF');
    cx.fillStyle=g;
    cx.beginPath(); roundRect2(cx,barX,barY,barW*pct,barH,5); cx.fill();
  }
  // Star markers
  for(let i=0;i<cfg.need;i++){
    const sx = barX + (barW/(cfg.need-1||1))*i;
    cx.fillStyle = (i < collected) ? '#FFD700' : 'rgba(255,255,255,0.3)';
    cx.font='8px sans-serif'; cx.textAlign='center';
    cx.fillText('★', sx, barY+5);
  }
}

// ── On-screen MOBA controls: joystick (left thumb) + attack button ─────────────
function drawControls() {
  // attack button, bottom-right (王者荣耀 style)
  const b=ATK_BTN;
  cx.save();
  const ready = PL.atkCd<=0;
  const bg=cx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,0,b.x,b.y,b.r);
  bg.addColorStop(0, ready?'rgba(255,150,110,0.85)':'rgba(120,120,130,0.6)');
  bg.addColorStop(1, ready?'rgba(210,50,40,0.75)':'rgba(70,70,80,0.55)');
  cx.fillStyle=bg;
  cx.beginPath(); cx.arc(b.x,b.y,b.r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.55)'; cx.lineWidth=2.5;
  cx.beginPath(); cx.arc(b.x,b.y,b.r,0,Math.PI*2); cx.stroke();
  // cooldown sweep
  if(!ready){
    cx.fillStyle='rgba(0,0,0,0.35)';
    cx.beginPath(); cx.moveTo(b.x,b.y);
    cx.arc(b.x,b.y,b.r,-Math.PI/2,-Math.PI/2+Math.PI*2*(PL.atkCd/18)); cx.closePath(); cx.fill();
  }
  cx.font='30px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('⚔️', b.x, b.y+1);
  // weapon level pips under the blade
  cx.font='bold 11px sans-serif'; cx.fillStyle='rgba(255,255,255,0.95)';
  cx.fillText('★'.repeat(weaponLv), b.x, b.y+26);
  cx.restore();

  // shop button (top-right, under the HUD)
  cx.save();
  const sb=SHOP_BTN;
  const sg2=cx.createRadialGradient(sb.x-6,sb.y-6,0,sb.x,sb.y,sb.r);
  sg2.addColorStop(0,'rgba(140,220,140,0.9)'); sg2.addColorStop(1,'rgba(30,140,70,0.85)');

  cx.strokeStyle='rgba(255,255,255,0.6)'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(sb.x,sb.y,sb.r,0,Math.PI*2); cx.stroke();
  cx.font='20px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';

  // joystick, only while the thumb is down

    if(mag>lim){ jx=jx/mag*lim; jy=jy/mag*lim; }
    cx.save();
    cx.strokeStyle='rgba(255,255,255,0.45)'; cx.lineWidth=2.5;
    cx.fillStyle='rgba(255,255,255,0.10)';
    cx.beginPath(); cx.arc(JOY.bx,JOY.by,lim,0,Math.PI*2); cx.fill(); cx.stroke();
    const kg=cx.createRadialGradient(JOY.bx+jx-6,JOY.by+jy-6,0,JOY.bx+jx,JOY.by+jy,26);
    kg.addColorStop(0,'rgba(255,255,255,0.95)'); kg.addColorStop(1,'rgba(190,190,220,0.85)');
    cx.fillStyle=kg;
    cx.beginPath(); cx.arc(JOY.bx+jx,JOY.by+jy,24,0,Math.PI*2); cx.fill();
    cx.restore();
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnOrbPtcs(x,y) {
  for(let i=0;i<12;i++){
    const angle = Math.random()*Math.PI*2;
    const spd = 2+Math.random()*4;
    ptcs.push({
      x,y,r:3+Math.random()*4,
      vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-1,
      life:35, max:35,
      color:`hsl(${100+Math.random()*80},100%,${60+Math.random()*20}%)`
    });
  }
}

function drawPtcs() {
  ptcs = ptcs.filter(p=>p.life>0);
  for(const p of ptcs){
    cx.save();
    cx.globalAlpha=p.life/p.max;
    cx.fillStyle=p.color;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*(p.life/p.max),0,Math.PI*2); cx.fill();
    cx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--;
  }
}

// ── Scene: Level ──────────────────────────────────────────────────────────────
function updateLevel() {
  tick++;
  if(lvDone) return;
  if(shopOpen) return;                 // world pauses while shopping
  if(PL.shield>0) PL.shield--;

  // ── Keep the road alive: defeated monsters respawn after a few seconds ──────
  const aliveCount = monsters.reduce((n,m)=>n+(m.alive?1:0), 0);
  const cap = LEVELS[lvIdx].obsCount;
  if(aliveCount < cap){
    spawnTimer++;
    const interval = Math.max(80, 170 - lvIdx*18);   // later levels refill faster
    if(spawnTimer >= interval){
      spawnTimer = 0;
      const m = spawnMonster(Math.random()<0.35);
      const mp = proj(m.u, m.z);
      spawnOrbPtcs(mp.x, mp.y);                       // poof so it's not a cheap shot
    }
  } else spawnTimer = 0;
  // prune long-dead monsters so the array doesn't grow forever
  if(monsters.length > cap*3) monsters = monsters.filter(m=>m.alive);

  // ── Move 茶茶 through the 3D scene: ▲ walks INTO the photo, ▼ back out ──────
  const uSpd=0.022, zSpd=0.0085;
  let moved=false;
  if(K.up)    { PL.z=Math.min(0.97, PL.z+zSpd); moved=true; }
  if(K.down)  { PL.z=Math.max(0.02, PL.z-zSpd); moved=true; }
  if(K.left)  { PL.u=Math.max(-1, PL.u-uSpd); PL.dir=-1; moved=true; }
  if(K.right) { PL.u=Math.min( 1, PL.u+uSpd); PL.dir=1;  moved=true; }
  if(!moved && JOY.active) {
    // virtual joystick: knob offset = walk direction (up on stick = forward)
    let jx=JOY.x-JOY.bx, jy=JOY.y-JOY.by;
    const mag=Math.hypot(jx,jy);
    if(mag>8){
      const cap=Math.min(mag,52)/52;                 // stick strength 0..1
      jx/=mag; jy/=mag;
      PL.u=Math.max(-1,Math.min(1, PL.u + jx*uSpd*cap));
      PL.z=Math.max(0.02,Math.min(0.97, PL.z - jy*zSpd*cap));
      if(Math.abs(jx)>0.35) PL.dir=jx>0?1:-1;
      moved=true;
    }
  }
  if(PL.inv>0) PL.inv--;
  if(PL.atkCd>0) PL.atkCd--;

  // Camera follows her: she stays big, the world glides past
  const camTarget = Math.max(0, Math.min(0.80, PL.z-0.12));
  camZ += (camTarget-camZ)*0.10;                    // smooth dolly
  const pp=proj(PL.u,PL.z); PL.x=pp.x; PL.y=pp.y;   // projected screen pos

  // ── Monster AI: mobile ones chase when 茶茶 gets close ───────────────────────
  for(const m of monsters){
    if(!m.alive) continue;
    if(m.flash>0) m.flash--;
    if(m.mobile){
      m.wob+=0.05;
      const du=PL.u-m.u, dz=PL.z-m.z;
      const d=Math.hypot(du, dz*3);
      if(d<m.aggro){                     // only chase when 茶茶 is really close
        m.u+=du/(d||1)*m.spd*6;
        m.z+=dz/(d||1)*m.spd*3;
      } else {                           // patrol gently around its own spot
        m.u += (m.homeU + Math.sin(m.wob)*0.22 - m.u)*0.02;
      }
      m.u=Math.max(-0.95,Math.min(0.95,m.u));
      m.z=Math.max(0.10,Math.min(0.90,m.z));
    }
    // contact damage (skip if behind camera, invincible, or shielded)
    if(PL.inv===0 && PL.shield<=0 && m.z>camZ+0.02){
      const mp=proj(m.u,m.z);
      if(Math.abs(mp.x-PL.x)<38*mp.s+14 && Math.abs(mp.y-PL.y)<30*mp.s+12){
        PL.inv=90; hitFlash=18; lives--;
        spawnOrbPtcs(PL.x,PL.y);
        if(lives<=0){ sfx.die(); lvDone=true; setTimeout(()=>{ startLevel(lvIdx); },1900); }
        else sfx.hurt();
      }
    }
  }
  if(hitFlash>0) hitFlash--;

  // ── Magic star shots fly into the scene and strike monsters ────────────────
  for(const s of shots){
    if(s.life<=0) continue;
    s.life--;
    if(s.target && s.target.alive){                    // gentle homing
      s.u += (s.target.u-s.u)*0.16;
      s.z += Math.sign(s.target.z-s.z)*0.028;
      if(Math.abs(s.target.z-s.z)<0.03) s.z=s.target.z;
    } else s.z += 0.03;
    if(s.z>0.97) s.life=0;
    for(const m of monsters){
      if(!m.alive) continue;
      if(Math.hypot(m.u-s.u,(m.z-s.z)*3.4)<0.11){
        s.life=0; m.hp-=s.dmg||1; m.flash=8;
        const mp=proj(m.u,m.z);
        if(m.hp<=0){
          m.alive=false; sfx.mdie();
          spawnOrbPtcs(mp.x,mp.y-20);
          // defeated monsters drop an energy orb + coins!
          orbs.push({ u:m.u, z:m.z, r:16, alive:true, phase:Math.random()*Math.PI*2 });
          addCoins(m.mobile?5:3, mp.x, mp.y-40);
        } else sfx.hitm();
        break;
      }
    }
  }
  shots=shots.filter(s=>s.life>0);

  // ── Collect orbs (world-space distance) ─────────────────────────────────────
  for(const orb of orbs){
    if(!orb.alive) continue;
    if(Math.hypot(orb.u-PL.u,(orb.z-PL.z)*3.4)<0.15){
      orb.alive=false; collected++;
      const op=proj(orb.u,orb.z);
      spawnOrbPtcs(op.x,op.y);
      addCoins(2, op.x, op.y-30);
      if(collected>=LEVELS[lvIdx].need && !goalOpen){ goalOpen=true; sfx.goal(); }
      else sfx.collect();
    }
  }

  // ── Walk into the glowing portal at the end of the road ────────────────────
  if(goalOpen && PL.z>0.88 && Math.abs(PL.u)<0.5){
    lvDone=true;
    addCoins(20);                          // level-clear bonus
    if(lvIdx+1 < LEVELS.length) { sfx.clear(); saveProgress(lvIdx+1); }
    else { sfx.win(); clearProgress(); }   // finished the whole journey!
    setTimeout(()=>{
      if(lvIdx+1 < LEVELS.length) { scene='trans'; transT=0; }
      else { scene='win'; winT=0; }
    }, 2200);
  }
}

function drawLevel() {
  const cfg = LEVELS[lvIdx];
  drawBg(cfg.bg);
  drawHeroPatch();   // hide the heroine printed in the photo — the sprite IS her now
  drawAmbient(tick);

  // Hit flash
  if(hitFlash>0){ cx.fillStyle=`rgba(255,0,0,${hitFlash*0.028})`; cx.fillRect(0,0,W,H); }

  drawGoal();

  // ── Depth-sorted 3D render pass: far things first, near things on top ───────
  const rl=[];
  for(const o of orbs) if(o.alive && o.z>camZ+0.02){ const p=proj(o.u,o.z); rl.push({z:o.z, f:()=>drawOrb(o,p.x,p.y,p.s)}); }
  for(const m of monsters) if(m.alive && m.z>camZ+0.02){
    const p=proj(m.u,m.z);
    rl.push({z:m.z, f:()=>{
      // ground shadow
      cx.fillStyle='rgba(0,0,0,0.22)';
      cx.beginPath(); cx.ellipse(p.x,p.y+30*p.s,30*p.s,7*p.s,0,0,Math.PI*2); cx.fill();
      const spr = m.mobile ? monSpr : statSpr;
      if(spr){
        // the actual creature/prop from the photo, breathing and swaying
        const asp = m.mobile ? monAsp : statAsp;
        const dh = (m.mobile?86:80)*p.s*1.25, dw=dh*asp;
        const sway = m.mobile ? Math.sin(tick*0.08+m.wob)*0.08 : 0;
        const bob  = m.mobile ? Math.sin(tick*0.12+m.wob)*3*p.s : 0;
        cx.save();
        cx.translate(p.x, p.y-dh*0.28+bob);
        cx.rotate(sway);
        if(m.flash>0) cx.filter='brightness(2.2)';
        if(m.mobile && PL.u<m.u) cx.scale(-1,1);   // face 茶茶
        cx.drawImage(spr, -dw/2, -dh/2, dw, dh);
        cx.restore();
      } else {
        drawObs(m, tick, p.x, p.y, p.s);
      }
      // HP bar
      const bw=44*p.s, bh=5*p.s;
      cx.fillStyle='rgba(0,0,0,0.55)';
      cx.fillRect(p.x-bw/2, p.y-62*p.s, bw, bh);
      cx.fillStyle = m.hp/m.maxHp>0.5 ? '#5EE05E' : '#FF5555';
      cx.fillRect(p.x-bw/2, p.y-62*p.s, bw*(m.hp/m.maxHp), bh);
    }});
  }
  for(const s of shots){
    const p=proj(s.u,s.z);
    rl.push({z:s.z, f:()=>{
      const pw=1+0.3*((s.dmg||1)-1);          // upgraded stars are bigger
      cx.save(); cx.translate(p.x,p.y-34*p.s); cx.rotate(tick*0.3);
      cx.shadowColor= s.dmg>=3?'#FF66FF': s.dmg>=2?'#66DDFF':'#FFD700';
      cx.shadowBlur=14+s.dmg*3;
      cx.fillStyle= s.dmg>=3?'#FFB8FF': s.dmg>=2?'#BFF0FF':'#FFE066';
      starPath(cx,0,0,5,(13*p.s+4)*pw,(5*p.s+1.6)*pw); cx.fill();
      cx.shadowBlur=0; cx.restore();
    }});
  }
  rl.push({z:PL.z, f:drawPlayer});
  rl.sort((a,b)=>b.z-a.z);          // far → near
  for(const r of rl) r.f();

  drawPtcs();
  drawHUD();
  drawControls();
  drawFloatTexts();
  if(shopOpen) drawShop();

  // Level done overlay — animated celebration / retry card
  if(lvDone){ lvDoneT++; drawLevelDoneOverlay(); }
}

function easeOutBack(p){ const c=1.70158; return 1+(c+1)*Math.pow(p-1,3)+c*Math.pow(p-1,2); }

// Per-level celebration themes — colors, title and a scene-matched effect
const CLEAR_THEME = [
  { title:'踏破云端！',   c1:[255,215,80],  c2:[255,150,210], fx:'meteor'    },
  { title:'深海凯旋！',   c1:[80,220,255],  c2:[170,255,240], fx:'bubbles'   },
  { title:'穿越沙海！',   c1:[255,180,40],  c2:[255,110,60],  fx:'sand'      },
  { title:'冰雪闪耀！',   c1:[160,225,255], c2:[235,250,255], fx:'snow'      },
  { title:'森林守护者！', c1:[130,255,120], c2:[255,200,230], fx:'fireflies' },
];
const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

// Scene-matched celebration particles (all deterministic from t — no state)
function drawClearFx(theme, t, fade, cxx, cyy) {
  const {c1,c2,fx}=theme;
  if(fx==='meteor'){                    // shooting stars streak across the sky
    for(let i=0;i<8;i++){
      const p=((t*(2.6+i%3)+i*97)%150)/150;
      const x=((i*151)%W)-40+p*260, y=-30+p*(H*0.85);
      const g=cx.createLinearGradient(x-70,y-58,x,y);
      g.addColorStop(0,'transparent'); g.addColorStop(1,rgba(i%2?c1:c2,0.85*fade));
      cx.strokeStyle=g; cx.lineWidth=2.5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(x-70,y-58); cx.lineTo(x,y); cx.stroke();
      cx.fillStyle=rgba([255,255,255],0.9*fade);
      cx.shadowColor=rgba(c1,0.9); cx.shadowBlur=8;
      cx.beginPath(); cx.arc(x,y,2.6,0,Math.PI*2); cx.fill(); cx.shadowBlur=0;
    }
  }
  else if(fx==='bubbles'){              // god-rays + streams of rising bubbles
    for(let i=0;i<4;i++){
      const bx=W*(0.14+i*0.24)+Math.sin(t*0.02+i*2)*18;
      const g=cx.createLinearGradient(bx,0,bx+46,H*0.8);
      g.addColorStop(0,rgba(c2,0.20*fade)); g.addColorStop(1,'transparent');
      cx.fillStyle=g;
      cx.beginPath(); cx.moveTo(bx-8,0); cx.lineTo(bx+34,0); cx.lineTo(bx+82,H*0.8); cx.lineTo(bx+30,H*0.8); cx.closePath(); cx.fill();
    }
    for(let i=0;i<22;i++){
      const x=(i*61)%W+Math.sin(t*0.06+i)*15;
      const y=H+20-((t*(2.2+i%3)+i*127)%(H+70));
      const r=3+i%6;
      cx.strokeStyle=rgba(c1,0.75*fade); cx.lineWidth=1.5;
      cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.stroke();
      cx.fillStyle=rgba([255,255,255],0.30*fade);
      cx.beginPath(); cx.arc(x-r*0.3,y-r*0.3,r*0.35,0,Math.PI*2); cx.fill();
    }
  }
  else if(fx==='sand'){                 // a golden sand vortex swirling the medal
    for(let i=0;i<34;i++){
      const ang=t*0.045+i*2.399, rad=46+((t*1.6+i*41)%210);
      const x=cxx+Math.cos(ang)*rad, y=cyy-26+Math.sin(ang)*rad*0.55;
      const a=Math.max(0,(1-rad/256))*0.85*fade;
      cx.fillStyle=rgba(i%3?c1:c2,a);
      cx.shadowColor=rgba(c1,a); cx.shadowBlur=5;
      cx.beginPath(); cx.arc(x,y,1.6+(i%3),0,Math.PI*2); cx.fill();
    }
    cx.shadowBlur=0;
  }
  else if(fx==='snow'){                 // falling snow + glinting ice shards
    for(let i=0;i<20;i++){
      const x=(i*67+Math.sin(t*0.04+i)*26+(W/2))%W;
      const y=((t*(1.6+i%3)+i*93)%(H+40))-20;
      cx.save(); cx.globalAlpha=(0.45+0.4*Math.sin(t*0.08+i))*fade;
      cx.fillStyle=rgba(c2,1); cx.font=`${10+i%8}px sans-serif`; cx.textAlign='center';
      cx.fillText('❄',x,y); cx.restore();
    }
    for(let i=0;i<8;i++){
      const ang=i*Math.PI/4+t*0.02, rad=128+Math.sin(t*0.06+i)*14;
      const x=cxx+Math.cos(ang)*rad, y=cyy-26+Math.sin(ang)*rad*0.8;
      cx.save(); cx.translate(x,y); cx.rotate(t*0.05+i);
      cx.fillStyle=rgba(c1,(0.5+0.5*Math.sin(t*0.15+i*2))*fade);
      cx.shadowColor=rgba(c2,0.9); cx.shadowBlur=10;
      cx.beginPath(); cx.moveTo(0,-13); cx.lineTo(4,0); cx.lineTo(0,13); cx.lineTo(-4,0); cx.closePath(); cx.fill();
      cx.restore();
    }
    cx.shadowBlur=0;
  }
  else if(fx==='fireflies'){            // firefly swarm + drifting petals
    for(let i=0;i<16;i++){
      const x=cxx+Math.cos(t*0.022+i*2.4)*(70+i*13)*Math.sin(t*0.013+i);
      const y=cyy-20+Math.sin(t*0.03+i*1.7)*(46+i*9);
      const a=(Math.sin(t*0.11+i*1.3)+1)*0.42*fade;
      cx.fillStyle=rgba(c1,a);
      cx.shadowColor=rgba(c1,a); cx.shadowBlur=11;
      cx.beginPath(); cx.arc(x,y,2.4,0,Math.PI*2); cx.fill();
    }
    cx.shadowBlur=0;
    for(let i=0;i<11;i++){
      const x=(i*97+Math.sin(t*0.03+i)*42)%W;
      const y=((t*(1.3+i%2)+i*131)%(H+40))-20;
      cx.save(); cx.translate(x,y); cx.rotate(t*0.06+i);
      cx.fillStyle=rgba(c2,0.8*fade);
      cx.beginPath(); cx.ellipse(0,0,6,3.4,0,0,Math.PI*2); cx.fill();
      cx.restore();
    }
  }
}

function drawLevelDoneOverlay() {
  const t=lvDoneT, cxx=W/2, cyy=H*0.44;
  const fade=Math.min(t/12,1);
  cx.fillStyle=`rgba(8,4,26,${0.55*fade})`; cx.fillRect(0,0,W,H);
  const pop=easeOutBack(Math.min(t/16,1));       // bouncy entrance
  const ok = lives>0;
  const theme=CLEAR_THEME[lvIdx]||CLEAR_THEME[0];

  // rotating light rays behind the badge, tinted for this level's scene
  cx.save(); cx.translate(cxx,cyy); cx.rotate(tick*0.012);
  for(let i=0;i<12;i++){
    cx.rotate(Math.PI/6);
    const rg=cx.createLinearGradient(0,0,0,-230);
    rg.addColorStop(0, ok?rgba(i%2?theme.c1:theme.c2,0.22*fade):`rgba(140,160,255,${0.16*fade})`);
    rg.addColorStop(1,'transparent');
    cx.fillStyle=rg;
    cx.beginPath(); cx.moveTo(0,0); cx.lineTo(-26,-230); cx.lineTo(26,-230); cx.closePath(); cx.fill();
  }
  cx.restore();

  // scene-matched celebration effect
  if(ok) drawClearFx(theme, t, fade, cxx, cyy);

  // medal badge
  cx.save(); cx.translate(cxx,cyy-26); cx.scale(pop,pop);
  cx.shadowColor= ok?'rgba(255,180,40,0.9)':'rgba(120,140,255,0.7)'; cx.shadowBlur=34;
  const bg=cx.createRadialGradient(-18,-22,0,0,0,74);
  if(ok){ bg.addColorStop(0,'#FFF3B8'); bg.addColorStop(0.55,'#FFC93C'); bg.addColorStop(1,'#E08A00'); }
  else  { bg.addColorStop(0,'#DfE6FF'); bg.addColorStop(0.55,'#8FA3E8'); bg.addColorStop(1,'#5568B8'); }
  cx.fillStyle=bg; cx.beginPath(); cx.arc(0,0,72,0,Math.PI*2); cx.fill();
  cx.shadowBlur=0;
  cx.lineWidth=5; cx.strokeStyle= ok?'rgba(255,250,220,0.95)':'rgba(230,238,255,0.9)';
  cx.beginPath(); cx.arc(0,0,72,0,Math.PI*2); cx.stroke();
  cx.lineWidth=2; cx.strokeStyle= ok?'rgba(180,110,0,0.55)':'rgba(60,75,140,0.6)';
  cx.beginPath(); cx.arc(0,0,62,0,Math.PI*2); cx.stroke();
  // badge icon — the level's OWN energy orb from the photo, set in the medal
  if(ok){
    if(orbSpr){
      cx.save();
      cx.beginPath(); cx.arc(0,0,56,0,Math.PI*2); cx.clip();
      const oh=104, ow=oh*orbAsp;
      cx.drawImage(orbSpr, -ow/2, -oh/2+2, ow, oh);
      cx.restore();
      // slow-spinning sparkle ring around the orb
      for(let i=0;i<6;i++){
        const a=tick*0.04+i*Math.PI/3;
        cx.fillStyle='rgba(255,255,255,0.9)';
        cx.shadowColor='#FFF'; cx.shadowBlur=8;
        starPath(cx,Math.cos(a)*52,Math.sin(a)*52,4,5,2); cx.fill();
      }
      cx.shadowBlur=0;
    } else {
      cx.fillStyle='#FFFDF2'; cx.shadowColor='#FFF'; cx.shadowBlur=12;
      starPath(cx,0,2,5,40,17); cx.fill(); cx.shadowBlur=0;
    }
  } else {
    cx.font='58px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText('💔',0,4);
  }
  cx.restore();

  // expanding shockwave rings on entrance
  if(ok && t<40){
    const rp=t/40;
    cx.strokeStyle=rgba(theme.c1,(1-rp)*0.8);
    cx.lineWidth=4*(1-rp)+1;
    cx.beginPath(); cx.arc(cxx,cyy-26,80+rp*190,0,Math.PI*2); cx.stroke();
    cx.strokeStyle=rgba(theme.c2,(1-rp)*0.55);
    cx.beginPath(); cx.arc(cxx,cyy-26,80+rp*130,0,Math.PI*2); cx.stroke();
  }

  // three little stars pop in one-by-one above the medal (success only)
  if(ok) for(let i=0;i<3;i++){
    const st=Math.min(Math.max((t-20-i*9)/10,0),1);
    if(st<=0) continue;
    const sp=easeOutBack(st);
    const ang=-Math.PI/2 + (i-1)*0.62;
    const sx2=cxx+Math.cos(ang)*112, sy2=cyy-26+Math.sin(ang)*104;
    cx.save(); cx.translate(sx2,sy2); cx.scale(sp,sp); cx.rotate((1-st)*1.2);
    cx.shadowColor='#FFD700'; cx.shadowBlur=14;
    cx.fillStyle='#FFE066'; starPath(cx,0,0,5,20,8.5); cx.fill();
    cx.shadowBlur=0; cx.restore();
  }

  // banner text
  const ty=cyy+92;
  cx.save(); cx.globalAlpha=Math.min(Math.max((t-8)/12,0),1);
  cx.font='bold 32px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
  cx.lineWidth=6; cx.strokeStyle='rgba(20,8,30,0.7)'; cx.lineJoin='round';
  const title= ok?theme.title:'差一点点！';
  cx.strokeText(title,cxx,ty);
  const tg=cx.createLinearGradient(0,ty-18,0,ty+18);
  if(ok){ tg.addColorStop(0,'#FFFFFF'); tg.addColorStop(0.45,rgba(theme.c2,1)); tg.addColorStop(1,rgba(theme.c1,1)); }
  else  { tg.addColorStop(0,'#E8EEFF'); tg.addColorStop(1,'#9FB2F0'); }
  cx.fillStyle=tg; cx.fillText(title,cxx,ty);
  if(ok){
    cx.shadowColor=rgba(theme.c1,0.9); cx.shadowBlur=18;
    cx.fillText(title,cxx,ty); cx.shadowBlur=0;
  }
  cx.restore();

  // subtitle
  cx.save(); cx.globalAlpha=Math.min(Math.max((t-18)/14,0),1);
  cx.font='16px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillStyle='rgba(255,255,255,0.92)';
  cx.fillText(ok ? (lvIdx+1<LEVELS.length?'茶茶继续前进…':'茶茶要回家啦！') : '别灰心，马上再来一次！', cxx, ty+38);
  cx.restore();
}

// ── Scene: Win ────────────────────────────────────────────────────────────────
function drawWin() {
  winT++;
  drawBg('garden'); vignette(0.35);

  // Confetti
  for(let i=0;i<12;i++){
    const hue = (winT*3+i*30)%360;
    const x = (winT*17+i*137)%W;
    const y = (winT*11+i*97)%H;
    cx.fillStyle=`hsla(${hue},90%,65%,0.7)`;
    cx.beginPath(); cx.arc(x,y,4,0,Math.PI*2); cx.fill();
  }

  cx.fillStyle='rgba(5,2,20,0.6)';
  cx.beginPath(); roundRect2(cx,W/2-185,H/2-110,370,220,20); cx.fill();
  cx.strokeStyle='rgba(255,215,0,0.4)'; cx.lineWidth=2;
  cx.beginPath(); roundRect2(cx,W/2-185,H/2-110,370,220,20); cx.stroke();

  cx.fillStyle='#FFD700'; cx.shadowColor='#FF8800'; cx.shadowBlur=20;
  cx.font='bold 28px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('🎉 茶茶回家了！', W/2, H/2-62);
  cx.shadowBlur=0;

  cx.fillStyle='rgba(255,255,255,0.92)'; cx.font='16px sans-serif';
  cx.fillText('茶茶穿越了云端、大海、沙漠、', W/2, H/2-20);
  cx.fillText('冰雪王国和魔法森林，', W/2, H/2+8);
  cx.fillText('终于平安回到了温暖的小木屋！', W/2, H/2+36);

  cx.fillStyle='rgba(255,220,80,0.7)'; cx.font='15px sans-serif';
  cx.fillText('茶茶是最勇敢的小冒险家！ 🌸', W/2, H/2+72);

  if(winT > 80) {
    if(Math.floor(winT/30)%2===0){
      cx.fillStyle='rgba(255,255,255,0.75)'; cx.font='14px sans-serif';
      cx.fillText('▶ 点击重新开始 ◀', W/2, H/2+106);
    }
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
  try {
    cx.clearRect(0,0,W,H);

    if(scene==='loading'){
      cx.fillStyle='#1a0a3e'; cx.fillRect(0,0,W,H);
      cx.fillStyle='white'; cx.font='20px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText('加载中…', W/2, H/2);
    } else if(scene==='intro')  { drawIntro(); }
    else if(scene==='trans')    { drawTrans(); }
    else if(scene==='level')    { updateLevel(); drawLevel(); }
    else if(scene==='win')      { drawWin(); }
  } catch(err) {
    // A single bad frame must never freeze the whole game.
    console.error('frame error:', err);
  }
  // Always schedule the next frame, even if this one threw.
  requestAnimationFrame(loop);
}

// Start render loop immediately (shows loading until images ready)
requestAnimationFrame(loop);
</script>
